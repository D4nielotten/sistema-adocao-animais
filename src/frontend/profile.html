<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu perfil - Sistema de Adocao</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-logo">
        <i class="fas fa-paw"></i> Adote um Amigo
      </div>
      <div class="nav-actions">
        <a class="btn btn-secondary" href="index.html">Voltar</a>
      </div>
    </div>
  </nav>

  <section class="container">
    <div class="section-title">
      <h2>Meu perfil</h2>
      <p>Informacoes da conta logada</p>
    </div>

    <div class="form-card" id="perfilCard">
      <div class="profile-top">
        <div class="avatar-wrapper">
          <img id="avatarPreview" class="image-preview" alt="Avatar de perfil">
          <div id="avatarFallback" class="avatar-fallback">
            <i class="fas fa-user"></i>
          </div>
        </div>
        <div class="profile-top-content">
          <label class="file-label" for="perfilFoto">Escolher novo ícone</label>
          <input type="file" id="perfilFoto" accept="image/png, image/jpeg, image/webp">
        </div>
      </div>

      <div class="form-group">
        <label for="perfilNome"><strong>Nome de usuário:</strong></label>
        <input type="text" id="perfilNome" placeholder="Digite seu nome de usuário">
      </div>

      <p class="profile-text"><strong>Email:</strong> <span id="perfilEmail">-</span></p>
      <p class="profile-text"><strong>Tipo de conta:</strong> <span id="perfilRole">-</span></p>

      <div class="form-row">
        <button id="perfilSalvar" class="btn btn-primary" type="button">Salvar alterações</button>
        <button id="perfilLogout" class="btn btn-secondary" type="button">Sair</button>
      </div>
      <p class="success-message" id="perfilMensagem"></p>
    </div>
  </section>

  <footer class="footer">
    <p>&copy; 2026 Sistema de Adocao de Animais. Todos os direitos reservados.</p>
  </footer>

  <script src="assets/js/profile.js?v=20260504"></script>
</body>
</html>
