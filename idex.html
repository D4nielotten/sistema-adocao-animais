<!DOCTYPE html>
<html>

<head>
<title>Sistema de Adoção de Animais</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topo">
<h1>🐾 Adote um Amigo</h1>

<nav>
<a href="#">Início</a>
<a href="#">Animais</a>
<a href="#">Quero Adotar</a>
</nav>
</header>

<div class="conteudo">

<h2>Sistema de Cadastro de Animais para Adoção</h2>
<p>Facilitar a adoção responsável de cães e gatos</p>

<p id="contador"></p>

<h3>Cadastrar novo animal</h3>

<form id="formAnimal">

<input type="text" id="nome" placeholder="Nome do animal" required>

<select id="especie">
<option value="cao">Cão</option>
<option value="gato">Gato</option>
</select>

<input type="text" id="porte" placeholder="Porte" required>

<input type="file" id="foto" required>

<button type="submit">Cadastrar</button>

</form>

<h3>Animais disponíveis</h3>

<button onclick="filtrar('todos')">Todos</button>
<button onclick="filtrar('cao')">Cães</button>
<button onclick="filtrar('gato')">Gatos</button>

<div class="container" id="listaAnimais"></div>

<h3>Quero adotar</h3>

<form id="formAdotante">

<input type="text" placeholder="Seu nome" required>
<input type="text" placeholder="Telefone" required>
<input type="text" placeholder="Animal de interesse">

<button type="submit">Enviar interesse</button>

</form>

</div>

<script src="script.js"></script>

</body>
</html>
